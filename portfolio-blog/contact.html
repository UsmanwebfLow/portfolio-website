<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Your Name</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="container header-inner">
      <a href="./index.html" class="logo">Your Name</a>
      <nav class="site-nav" aria-label="Primary">
        <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">☰</button>
        <ul class="nav-list">
          <li><a class="nav-link" href="./index.html">Home</a></li>
          <li><a class="nav-link" href="./about.html">About</a></li>
          <li><a class="nav-link" href="./projects.html">Projects</a></li>
          <li><a class="nav-link" href="./blog.html">Blog</a></li>
          <li><a class="nav-link active" href="./contact.html">Contact</a></li>
        </ul>
      </nav>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </div>
  </header>

  <main id="main">
    <section class="section hero hero-compact reveal">
      <div class="container">
        <h1>Contact</h1>
        <p class="subtitle">Have a project in mind? Let's talk.</p>
      </div>
    </section>

    <section class="section reveal">
      <div class="container two-col">
        <div>
          <h2>Get in touch</h2>
          <p>Fill out the form and I'll get back to you within 1–2 business days.</p>
          <ul class="contact-info">
            <li>📧 <a href="mailto:you@example.com">you@example.com</a></li>
            <li>📍 Your City, Country</li>
          </ul>
        </div>
        <form id="contactForm" class="card" action="https://formspree.io/f/your_form_id" method="POST">
          <div class="card-body form-grid">
            <label>
              <span>Name</span>
              <input type="text" name="name" required />
            </label>
            <label>
              <span>Email</span>
              <input type="email" name="email" required />
            </label>
            <label class="full">
              <span>Message</span>
              <textarea name="message" rows="6" required></textarea>
            </label>
            <input type="hidden" name="subject" value="New portfolio contact" />
            <button class="btn btn-primary" type="submit">Send</button>
            <p id="formStatus" role="status" aria-live="polite"></p>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> Your Name. All rights reserved.</p>
      <div class="socials">
        <a href="#" aria-label="GitHub">🐙</a>
        <a href="#" aria-label="Twitter">🐦</a>
        <a href="#" aria-label="LinkedIn">💼</a>
      </div>
    </div>
  </footer>

  <script src="./assets/js/theme.js"></script>
  <script src="./assets/js/main.js"></script>
</body>
</html>
