<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Your Name</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <script defer src="/assets/js/theme.js"></script>
  <script defer src="/assets/js/main.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/index.html" class="logo">YourName</a>
      <nav class="nav" aria-label="Primary">
        <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">☰</button>
        <ul class="nav-list">
          <li><a href="/index.html">Home</a></li>
          <li><a href="/about.html">About</a></li>
          <li><a href="/projects.html">Projects</a></li>
          <li><a href="/blog/index.html">Blog</a></li>
          <li><a class="active" href="/contact.html">Contact</a></li>
        </ul>
      </nav>
      <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">🌓</button>
    </div>
  </header>

  <main>
    <section class="section reveal">
      <div class="container narrow">
        <h1>Contact</h1>
        <p>Have a question or want to work together? Send me a message.</p>
        <form class="form" action="https://formspree.io/f/yourFormId" method="POST">
          <div class="form-row">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required />
          </div>
          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="form-row">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>
          <div class="form-row">
            <button class="btn btn-primary" type="submit">Send</button>
          </div>
          <p class="muted small">This form uses Formspree. Replace the action URL with your own endpoint.</p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> Your Name. All rights reserved.</p>
      <div class="footer-links">
        <a href="https://github.com/yourname" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/yourname" target="_blank" rel="noopener">LinkedIn</a>
        <a href="/contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
